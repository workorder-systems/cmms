name: Test Suite

on:
  push:
    branches: [main, master, testing]
  pull_request:
    branches: [main, master, testing]

jobs:
  test:
    name: Run Database Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🔧 Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: 🚀 Start Supabase local instance
        id: start-supabase
        run: |
          echo "Starting Supabase local instance..."
          supabase start
          echo "Supabase started successfully"
        env:
          SUPABASE_DB_PASSWORD: postgres

      - name: ⏳ Wait for Supabase to be ready
        run: |
          echo "Waiting for Supabase services to be ready..."
          max_attempts=60
          attempt=0
          
          # Default values for local Supabase
          API_URL="http://127.0.0.1:54321"
          ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0"
          
          # Wait for Supabase CLI status and API to respond
          while [ $attempt -lt $max_attempts ]; do
            # First check if Supabase status command works
            if supabase status > /dev/null 2>&1; then
              # Test if API endpoint is responding (this is what matters)
              if curl -sf --max-time 5 "${API_URL}/rest/v1/" -H "apikey: ${ANON_KEY}" > /dev/null 2>&1; then
                echo "✓ Supabase API is ready and responding at ${API_URL}"
                break
              fi
            fi
            
            attempt=$((attempt + 1))
            if [ $((attempt % 5)) -eq 0 ]; then
              echo "Still waiting for Supabase... (attempt $attempt/$max_attempts)"
            fi
            sleep 2
          done
          
          if [ $attempt -eq $max_attempts ]; then
            echo "❌ Supabase failed to become ready after $max_attempts attempts (120 seconds)"
            echo "Current Supabase status:"
            supabase status || true
            echo ""
            echo "Debug: Testing API connection..."
            echo "API URL: ${API_URL}"
            curl -v --max-time 5 "${API_URL}/rest/v1/" -H "apikey: ${ANON_KEY}" || true
            exit 1
          fi
          
          echo "✓ Supabase is fully ready for testing at ${API_URL}"

      - name: 📊 Display Supabase status
        if: success()
        run: |
          echo "Supabase instance status:"
          supabase status || true

      - name: 🧪 Run test suite
        run: npm test
        env:
          CI: true

      - name: 🛑 Stop Supabase
        if: always()
        run: |
          echo "Stopping Supabase instance..."
          supabase stop || true
