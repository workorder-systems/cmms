# Build the Next.js docs app (apps/docs) and push a static export to the gh-pages branch.
#
# GitHub Pages: Settings → Pages → Build and deployment → Source = Deploy from a branch,
# branch gh-pages, folder / (root). Custom domain docs.workorder.systems is set in the same
# settings page; DNS should CNAME docs → workorder-systems.github.io (Cloudflare: DNS only).
#
# peaceiris writes CNAME on every deploy so the custom domain survives clean gh-pages pushes.
# next.config.mjs still uses NEXT_STATIC_EXPORT + NEXT_PAGES_BASE_PATH from configure-pages.
#
name: Deploy Next.js docs to Pages

on:
  push:
    branches: ['main']
    paths:
      - 'apps/docs/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-docs-to-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-docs
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: apps/docs/.next/cache
          key: ${{ runner.os }}-next-docs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/docs/**/*.[jt]s', 'apps/docs/**/*.[jt]sx', 'apps/docs/**/*.mdx', 'apps/docs/**/*.mjs') }}
          restore-keys: |
            ${{ runner.os }}-next-docs-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static export
        env:
          NEXT_STATIC_EXPORT: 'true'
          NEXT_PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: pnpm --filter work-order-systems-docs build

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apps/docs/out
          cname: docs.workorder.systems
          force_orphan: true
