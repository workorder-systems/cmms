name: Bug report
description: Report a reproducible problem
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please provide enough
        detail so we can reproduce and fix the issue.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and this is new
          required: true
        - label: I can reproduce this on the latest `main` branch
          required: false
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: Clear and concise description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Run ...
        2. Execute ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What you expected to happen
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Provide environment details
      placeholder: |
        OS:
        Node.js version:
        Supabase CLI version:
        Database version:
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Add any relevant logs or output
      render: shell
